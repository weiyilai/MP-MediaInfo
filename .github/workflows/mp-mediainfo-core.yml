name: MP-MediaInfo.Core

on:
  push:
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish_package:
        description: Publish package to NuGet
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore MP-MediaInfo.Core.slnx

      - name: Build solution
        run: dotnet build MP-MediaInfo.Core.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test MediaInfo.Wrapper.Tests/MediaInfo.Wrapper.Core.Tests.csproj --configuration Release --no-build --logger trx

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mp-mediainfo-core-package
          path: |
            MediaInfo.Wrapper/bin/Release/*.nupkg
            MediaInfo.Wrapper/bin/Release/*.snupkg
          if-no-files-found: error

  publish:
    name: Publish package
    needs: build-test
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish_package)

    steps:
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: mp-mediainfo-core-package
          path: artifacts

      - name: Push package to NuGet
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push symbol package to NuGet
        run: dotnet nuget push "artifacts/*.snupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate